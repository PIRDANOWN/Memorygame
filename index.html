<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Sambung Kata Realtime Pro - Ultra Edition</title>
    <script src="https://www.gstatic.com/firebasejs/12.11.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.11.0/firebase-database-compat.js"></script>
    <style>
        body { font-family:'Arial'; background:linear-gradient(120deg,#667eea,#764ba2); display:flex; justify-content:center; align-items:center; min-height:100vh; margin:0; color:white; }
        .card{ width:90%; max-width:600px; background:rgba(255,255,255,0.12); padding:20px; border-radius:25px; backdrop-filter:blur(12px); margin: 20px 0;}
        button,input,select{ width:100%; margin-top:5px; padding:12px; border:none; border-radius:12px; font-size:16px; cursor:pointer; box-sizing: border-box; }
        #log{height:150px; overflow:auto; background:#0004; padding:10px; margin:10px 0; border-radius:10px; font-size: 14px;}
        .hp-container { display: flex; justify-content: space-between; margin-bottom: 10px; gap: 10px; align-items: center; }
        .hp-box { flex: 1; background: rgba(0,0,0,0.4); padding: 10px; border-radius: 12px; text-align: center; border: 1px solid rgba(255,255,255,0.2); }
        .hp-val { font-size: 24px; font-weight: bold; display: block; }
        .hidden{display:none;}
        .ownerButton{position:fixed; top:20px; right:20px; background:#ff0; color:#000; border-radius:50%; width:50px; height:50px; display:flex; justify-content:center; align-items:center; font-weight:bold; cursor:pointer; z-index:999;}
        .ownerPanel{position:fixed; top:0; right:0; width:320px; height:100%; background:#111; padding:20px; transform:translateX(100%); transition:0.3s; overflow:auto; z-index:998;}
        .ownerPanel.active{transform:translateX(0);}
        .levelXP{font-size:14px; margin-bottom:10px; background: rgba(0,0,0,0.2); padding: 5px; border-radius: 8px;}
        .leaderboard{background:#0003; padding:10px; margin:5px 0; border-radius:10px; max-height:120px; overflow:auto;}
        .shop{background:#0003; padding:10px; margin:5px 0; border-radius:10px; display: grid; grid-template-columns: 1fr 1fr; gap: 5px;}
        .shop h4 { grid-column: span 2; margin: 5px 0; }
        .msg{margin-top:5px; font-weight:bold;}
        .roomSlots{display:flex; justify-content:space-around; margin-top:10px; gap: 10px;}
        .slot{flex:1; height:60px; background:#0004; border-radius:12px; display:flex; flex-direction:column; justify-content:center; align-items:center; font-size:14px; text-align: center; border: 1px solid rgba(255,255,255,0.1);}
        .slot b { font-size: 11px; color: #aaa; }
        .chatBox{height:120px; background:#0004; overflow:auto; padding:8px; border-radius:10px; margin:10px 0; font-size: 14px;}
        .chatInput{display:flex; gap:5px;}
        .chatInput input{flex:1; padding: 15px; font-size: 16px;}
        #nextWordArea { background: #ff0; color: #000; padding: 10px; border-radius: 12px; text-align: center; font-weight: bold; font-size: 20px; }
        .player-profile-info { background: rgba(255,255,255,0.1); padding: 8px; border-radius: 10px; font-size: 12px; margin-bottom: 5px; border: 1px solid rgba(255,255,255,0.2); }
        .btn-discord { background: #7289da; color: white; font-weight: bold; text-decoration: none; display: block; text-align: center; margin-top: 10px; padding: 12px; border-radius: 12px; }
    </style>
</head>
<body>
    <div class="ownerButton" id="ownerBtn">🔑</div>
    
    <div class="card" id="auth">
        <h3>LOGIN / REGISTER 🎮</h3>
        <input id="username" placeholder="Username">
        <input id="password" type="password" placeholder="Password">
        <button id="btnLogin">Login 🔓</button>
        <button id="btnRegister">Register 📝</button>
        <p id="msg" class="msg"></p>
        <hr>
        <h3>MODE BERMAIN 🕹️</h3>
        <select id="modeSelect">
            <option value="single">Single (AI - 75K Words)</option>
            <option value="multi">Multiplayer (Realtime)</option>
        </select>
        <select id="difficultySelect">
            <option value="easy">Easy</option>
            <option value="normal">Normal</option>
            <option value="hard">Hard</option>
        </select>
        <input id="roomInput" placeholder="ID Room (Wajib untuk Multi)">
        <button id="btnStart" style="background: #4caf50; color: white; font-weight: bold;">Mulai Game 🚀</button>
        <a href="https://discord.gg/WBfeqPT49" target="_blank" class="btn-discord">JOIN DISCORD 💬</a>
    </div>

    <div class="card hidden" id="game">
        <div class="levelXP">⭐ LV: <span id="level">1</span> | 🧪 XP: <span id="xp">0</span> | 🪙 Coin: <span id="coin">0</span></div>

        <div class="hp-container">
            <div class="hp-box"><b>KAMU</b><span id="pHPText" class="hp-val">5</span></div>
            <div id="timer" style="font-size: 45px; text-align: center; font-weight: bold; color: #ff4d4d; min-width: 80px;">10</div>
            <div class="hp-box"><b>LAWAN</b><span id="oHPText" class="hp-val">5</span></div>
        </div>

        <div id="nextWordArea">AWALAN: <span id="nextWord">-</span></div>

        <div id="log"></div>
        <input id="input" placeholder="Ketik kata sambungan..." style="border: 2px solid #ff0; margin-top: 10px;">
        <button id="btnSend" style="background: #667eea; color: white;">Kirim Kata ✈️</button>

        <div class="roomSlots">
            <div class="slot" id="slot1"><b>Kamu</b><span id="name1">-</span></div>
            <div class="slot" id="slot2"><b>Lawan</b><span id="name2">-</span></div>
        </div>

        <div class="shop" id="shop">
            <h4>Shop 🛒</h4>
            <button id="btnHeal">Heal (10 🪙)</button>
            <button id="btnHint">Hint (5 🪙)</button>
            <button id="btnDoubleXP">2x XP (20 🪙)</button>
            <button id="btnShield">Shield (25 🪙)</button>
        </div>

        <div id="leaderboard" class="leaderboard"></div>

        <div class="player-profile-info" id="playerProfile">
            👤 Name: - | 🆔 ID: - | 🆔 ROOM: -
        </div>

        <div class="chatBox" id="chatBox"></div>
        <div class="chatInput">
            <input id="chatInput" placeholder="Ketik pesan chat...">
            <button id="btnChat" style="width: 80px;">Kirim</button>
        </div>
        <button id="btnRestart">Restart 🔄</button>
        <button id="btnLogout" style="background: #ff4d4d;">Keluar 🚪</button>
    </div>

    <div id="ownerPanel" class="ownerPanel">
        <h3>OWNER PANEL 🔑</h3>
        <input id="ownerKey" placeholder="Key admin">
        <button id="btnOwnerCheck">Masuk</button>
        <div id="ownerMenu" class="hidden">
            <p>Last Word: <span id="lastWord">-</span></p>
            <hr>
            <input id="targetBanned" placeholder="Username Target">
            <button id="btnBanned" style="background: red;">BANNED 🚫</button>
            <hr>
            <button id="btnOwnerWin">AUTO WIN 🏆</button>
            <button id="btnHealMe">HEAL ME ❤️</button>
            <button id="btnSpawnCoin">+500 COIN 🪙</button>
            <button id="btnKillOpponent" style="background: black; color: white;">KILL LAWAN 💀</button>
        </div>
        <button id="btnOwnerClose">Tutup</button>
    </div>

<script>
window.onload=function(){
    const firebaseConfig = {
      apiKey: "AIzaSyAsegtxDbDkADPrd_dmqUqpIrhwKUOUU0o",
      authDomain: "pirdangame.firebaseapp.com",
      databaseURL: "https://pirdangame-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "pirdangame",
      storageBucket: "pirdangame.firebasestorage.app",
      messagingSenderId: "109134208993",
      appId: "1:109134208993:web:22efa124fd0dda427fbca0",
      measurementId: "G-Z3JH9TYHVX"
    };

    firebase.initializeApp(firebaseConfig);
    const db=firebase.database();

    const ADMIN_KEY="PIRDANOWN2211";
    let playerData={username:"",level:1,xp:0,coin:0,uid:""};
    let roomName="", mode="single", used=[], current="";
    let pHP=5, oHP=5, timerInterval, time=10;
    let healUsed=false, hasShield=false, doubleXP=false, opponentFound=false;

    let dictionary = [];
    let commonWords = ["aku","kamu","makan","minum","lari","jalan","tidur","bangun","rumah","nasi","mobil","motor","buku","meja","kursi","lampu","pintu","sepatu","celana","topi"];

    fetch('https://raw.githubusercontent.com/dwyl/english-words/master/words_alpha.txt')
    .then(r => r.text()).then(text => {
        dictionary = text.split('\n').map(w => w.trim().toLowerCase()).filter(w => w.length > 2);
    }).catch(() => dictionary = commonWords);

    const $=(id)=>document.getElementById(id);
    const pHPText=$("pHPText"), oHPText=$("oHPText"), logEl=$("log"), timerEl=$("timer"), nextWord=$("nextWord"), input=$("input");
    const levelEl=$("level"), xpEl=$("xp"), coinEl=$("coin"), chatBox=$("chatBox"), msgEl=$("msg"), ownerMenu=$("ownerMenu");

    $("btnRegister").onclick=register;
    $("btnLogin").onclick=login;
    $("btnStart").onclick=joinRoom;
    $("btnSend").onclick=playerTurn;
    $("btnRestart").onclick=()=>initGame(true);
    $("btnHeal").onclick=useHeal;
    $("btnHint").onclick=hintWord;
    $("btnDoubleXP").onclick=()=>buyItem('xp');
    $("btnShield").onclick=()=>buyItem('shield');
    $("btnChat").onclick=sendChat;
    $("ownerBtn").onclick=()=>$("ownerPanel").classList.toggle("active");
    $("btnOwnerCheck").onclick=()=>{ if($("ownerKey").value===ADMIN_KEY) ownerMenu.classList.remove("hidden"); else alert("Key Salah! ❌"); };
    $("btnKillOpponent").onclick=()=>{ if(mode==="multi") db.ref("rooms/"+roomName+"/players/"+(Object.keys(players).find(p=>p!==playerData.username))).update({HP:0}); };
    $("btnSpawnCoin").onclick=()=>{ playerData.coin+=500; updateStats(); db.ref("users/"+playerData.username).update({coin:playerData.coin}); };

    function register(){
        let u=$("username").value.trim().toLowerCase(), p=$("password").value;
        if(!u||!p){ msgEl.innerText="⚠️ Isi semua field!"; return; }
        db.ref("users/"+u).get().then(s=>{
            if(s.exists()){ msgEl.innerText="❌ User sudah ada!"; return; }
            db.ref("users/"+u).set({pass:p,coin:100,level:1,xp:0,uid:"ID-"+Math.floor(Math.random()*9999)}).then(()=>msgEl.innerText="✅ Berhasil!");
        });
    }

    function login(){
        let u=$("username").value.trim().toLowerCase(), p=$("password").value;
        db.ref("users/"+u).get().then(s=>{
            if(s.exists() && s.val().pass===p){
                playerData={...s.val(),username:u}; msgEl.innerText="✅ Login Sukses!"; updateProfile();
            } else { msgEl.innerText="❌ Login Gagal!"; }
        });
    }

    function updateProfile(){
        $("playerProfile").innerText = `👤 Name: ${playerData.username} | 🆔 ID: ${playerData.uid} | 🆔 ROOM: ${roomName||'-'}`;
        updateStats();
    }

    function joinRoom(){
        if(!playerData.username) return alert("Login dulu! 🔒");
        mode=$("modeSelect").value;
        roomName=$("roomInput").value.trim();

        if(mode==="multi"){
            if(!roomName) return alert("❌ Masukkan ID Room untuk Multiplayer!");
            const roomRef = db.ref("rooms/"+roomName);
            roomRef.child("players/"+playerData.username).set({HP:5, online:true});
            
            roomRef.on("value", snap=>{
                const data = snap.val(); if(!data) return;
                const players = Object.keys(data.players||{});
                let opp = players.find(p=>p!==playerData.username);
                opponentFound = !!opp;
                
                pHP = data.players[playerData.username].HP;
                if(opp) oHP = data.players[opp].HP;

                $("name1").innerText = playerData.username;
                $("name2").innerText = opp || "Menunggu Lawan... ⏳";
                
                if(data.currentWord && data.currentWord !== current){
                    current = data.currentWord; used = data.used || [];
                    log(`👤 ${data.lastPlayer}: ${current}`);
                    setNext(); startTimer();
                }
                updateHP(); checkEnd();
                if(players.length>=2 && !data.currentWord) initGame(true);
            });
            listenChat();
        } else {
            roomName = "OFFLINE"; initGame(true);
        }
        $("auth").classList.add("hidden"); $("game").classList.remove("hidden");
        updateProfile();
    }

    function initGame(reset){
        clearInterval(timerInterval);
        used=["makan"]; current="makan"; pHP=5; oHP=5; healUsed=false;
        log("🎮 Game Dimulai! Kata awal: <b>makan</b>");
        if(mode==="multi") db.ref("rooms/"+roomName).update({currentWord:current, used:used, waitingFor:playerData.username, lastPlayer:"Sistem"});
        setNext(); updateHP(); startTimer();
    }

    function playerTurn(){
        if(mode==="multi" && !opponentFound) return alert("⏳ Tunggu lawan masuk dulu!");
        let w=input.value.toLowerCase().trim(); input.value="";
        if(!w) return;
        if(used.includes(w)){ log("⚠️ Kata sudah dipakai!"); return; }
        if(!w.startsWith(current.slice(-2))){ log("❌ Salah awalan! Harus: "+current.slice(-2)); damagePlayer(1); return; }
        
        used.push(w); current=w; log(`🧑 Kamu: ${w} ✅`); gainXP(); setNext();
        if(mode==="multi") db.ref("rooms/"+roomName).update({currentWord:w, used:used, lastPlayer:playerData.username});
        else { startTimer(); setTimeout(aiTurn, 1000); }
    }

    function aiTurn(){
        let last2 = current.slice(-2);
        let options = dictionary.filter(w=>w.startsWith(last2) && !used.includes(w));
        if(!options.length){ log("🤖 AI Menyerah! 🏳️"); damageOpponent(1); return; }
        let pick = options[Math.floor(Math.random()*options.length)];
        used.push(pick); current=pick; log(`🤖 AI: ${pick} ⚡`); setNext(); startTimer();
    }

    function startTimer(){
        clearInterval(timerInterval); time=10; timerEl.innerText=time;
        timerInterval=setInterval(()=>{
            time--; timerEl.innerText=time;
            if(time<=0){ log("⏰ Waktu Habis! Darah bocor! 🩸"); damagePlayer(1); time=10; }
        },1000);
    }

    function damagePlayer(d){
        if(hasShield){ log("🛡️ Shield melindungi kamu!"); hasShield=false; return; }
        pHP-=d; if(pHP<0)pHP=0; updateHP();
        if(mode==="multi") db.ref("rooms/"+roomName+"/players/"+playerData.username).update({HP:pHP});
        checkEnd();
    }

    function damageOpponent(d){ oHP-=d; if(oHP<0)oHP=0; updateHP(); checkEnd(); }

    function checkEnd(){
        if(pHP<=0){ log("🏁 KAMU KALAH! 💀"); clearInterval(timerInterval); }
        else if(oHP<=0){ log("🏁 KAMU MENANG! 🏆"); clearInterval(timerInterval); }
    }

    function useHeal(){
        if(healUsed) return alert("❌ Heal cuma bisa 1x per game! 🧪");
        if(playerData.coin<10) return alert("🪙 Coin tidak cukup!");
        playerData.coin-=10; pHP=5; healUsed=true; updateHP(); updateStats();
        log("❤️ Kamu memulihkan HP!");
    }

    function buyItem(type){
        if(type==='xp' && playerData.coin>=20){ playerData.coin-=20; doubleXP=true; log("✨ 2x XP Aktif!"); }
        if(type==='shield' && playerData.coin>=25){ playerData.coin-=25; hasShield=true; log("🛡️ Shield Aktif!"); }
        updateStats();
    }

    function hintWord(){
        if(playerData.coin<5) return alert("🪙 Coin kurang!");
        let h = dictionary.find(w=>w.startsWith(current.slice(-2)) && !used.includes(w));
        if(h){ playerData.coin-=5; log("💡 Hint: "+h); updateStats(); }
    }

    function log(t){ logEl.innerHTML+=t+"<br>"; logEl.scrollTop=logEl.scrollHeight; }
    function setNext(){ nextWord.innerText=current.slice(-2).toUpperCase(); }
    function updateHP(){ pHPText.innerText=pHP; oHPText.innerText=oHP; }
    function updateStats(){ levelEl.innerText=playerData.level; coinEl.innerText=playerData.coin; xpEl.innerText=playerData.xp; }
    function gainXP(){ let n=Math.floor(Math.random()*10)+5; if(doubleXP)n*=2; playerData.xp+=n; if(playerData.xp>=100){playerData.level++;playerData.xp=0;} updateStats(); db.ref("users/"+playerData.username).update(playerData); }
    
    function sendChat(){
        let m=$("chatInput").value; if(!m)return;
        db.ref("rooms/"+roomName+"/chat").push({user:playerData.username, msg:m}); $("chatInput").value="";
    }
    function listenChat(){
        db.ref("rooms/"+roomName+"/chat").on("child_added",s=>{ chatBox.innerHTML+=`<b>${s.val().user}:</b> ${s.val().msg}<br>`; chatBox.scrollTop=chatBox.scrollHeight; });
    }
};
</script>
</body>
</html>
